<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging System</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
            width: 95vw;
            height: 95vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-form {
            text-align: center;
        }

        .login-form h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .login-form p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .login-form input {
            width: 300px;
            padding: 12px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            margin-bottom: 15px;
            display: block;
        }

        .login-form button {
            width: 300px;
            padding: 12px;
            font-size: 1rem;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .login-form button:hover {
            background: #f0f0f0;
        }

        .main-content {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .main-content.hidden {
            display: none;
        }

        .sidebar {
            width: 250px;
            background: #f5f5f5;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .sidebar-header h2 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .sidebar-header button {
            width: 100%;
            padding: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .sidebar-header button:hover {
            background: #5568d3;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .channel-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.3s;
        }

        .channel-item:hover {
            background: #e8e8e8;
        }

        .channel-item.active {
            background: #e0e7ff;
            border-left-color: #667eea;
            font-weight: bold;
        }

        .user-info {
            padding: 15px 20px;
            background: #fff3cd;
            border-top: 1px solid #e0e0e0;
            font-size: 0.9rem;
        }

        .user-info p {
            margin: 5px 0;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 1.3rem;
        }

        .chat-header button {
            padding: 6px 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .chat-header button:hover {
            background: #ee5a52;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 12px;
            background: #f0f0f0;
            word-wrap: break-word;
        }

        .message.own .message-bubble {
            background: #667eea;
            color: white;
        }

        .message-sender {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 2px;
            color: #666;
        }

        .message.own .message-sender {
            color: #667eea;
            text-align: right;
        }

        .message-time {
            font-size: 0.75rem;
            color: #999;
            margin-top: 2px;
        }

        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
        }

        .input-area button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .input-area button:hover {
            background: #5568d3;
        }

        .no-channel {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            font-size: 1.1rem;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.connected {
            background: #51cf66;
        }

        .status-indicator.disconnected {
            background: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div id="loginScreen" class="login-screen">
            <div class="login-form">
                <h1>💬 Chat</h1>
                <p>Simple Real-Time Messaging</p>
                
                <!-- Login Form -->
                <div id="loginForm">
                    <h2 style="font-size: 1.5rem; margin-bottom: 20px;">Login</h2>
                    <input type="text" id="loginUsername" placeholder="Username" autofocus>
                    <input type="password" id="loginPassword" placeholder="Password">
                    <button onclick="handleLogin()" style="margin-bottom: 15px;">Login</button>
                    <p style="font-size: 0.95rem;">Don't have an account? <a href="#" onclick="switchToSignup(event)" style="color: white; text-decoration: underline;">Sign up</a></p>
                </div>
                
                <!-- Signup Form -->
                <div id="signupForm" style="display: none;">
                    <h2 style="font-size: 1.5rem; margin-bottom: 20px;">Create Account</h2>
                    <input type="text" id="signupUsername" placeholder="Choose a username">
                    <input type="password" id="signupPassword" placeholder="Password (min 6 chars)">
                    <input type="password" id="signupPassword2" placeholder="Confirm password">
                    <button onclick="handleSignup()" style="margin-bottom: 15px;">Sign Up</button>
                    <p style="font-size: 0.95rem;">Already have an account? <a href="#" onclick="switchToLogin(event)" style="color: white; text-decoration: underline;">Login</a></p>
                </div>
                
                <div id="authError" style="color: #ffcccc; margin-top: 15px; display: none;"></div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div id="mainContent" class="main-content hidden">
            <!-- Sidebar with Channels -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>Channels</h2>
                    <button onclick="showCreateChannel()">+ New Channel</button>
                </div>
                <div id="channelsList" class="channels-list"></div>
                <div class="user-info">
                    <p><span class="status-indicator connected" id="statusIndicator"></span>Status: <span id="statusText">Connected</span></p>
                    <p>User: <span id="currentUser"></span></p>
                    <button onclick="logout()" style="width: 100%; margin-top: 10px; padding: 6px; background: #ff6b6b; color: white; border: none; border-radius: 4px; cursor: pointer;">Logout</button>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div class="chat-header">
                    <h3 id="currentChannel">Select a channel</h3>
                    <button onclick="leaveCurrentChannel()" id="leaveBtn" style="display: none;">Leave</button>
                </div>
                <div class="messages-container" id="messagesContainer">
                    <div class="no-channel">Select or create a channel to start chatting</div>
                </div>
                <div class="input-area" id="inputArea" style="display: none;">
                    <input type="text" id="messageInput" placeholder="Type a message..." autofocus>
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = null;
        let currentChannel = null;
        const messages = {};

        // Initialize
        socket.on('connect', () => {
            console.log('Connected to server');
            updateStatus(true);
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            updateStatus(false);
        });

        socket.on('user_registered', (data) => {
            currentUser = data.username;
            document.getElementById('currentUser').textContent = currentUser;
            showMainContent();
            loadChannels();
        });

        socket.on('channels_list', (data) => {
            updateChannelsList(data.channels);
        });

        socket.on('user_joined', (data) => {
            const notification = `${data.username} joined the channel`;
            addSystemMessage(data.channel, notification);
        });

        socket.on('user_left', (data) => {
            const notification = `${data.username} left the channel`;
            addSystemMessage(data.channel, notification);
        });

        socket.on('channel_history', (data) => {
            const channel = data.channel;
            messages[channel] = data.messages;
            if (currentChannel === channel) {
                displayMessages(channel);
            }
        });

        socket.on('receive_message', (data) => {
            if (!messages[data.channel]) {
                messages[data.channel] = [];
            }
            messages[data.channel].push(data);
            if (currentChannel === data.channel) {
                displayMessages(data.channel);
            }
        });

        socket.on('channel_deleted', (data) => {
            // Refresh channels list
            loadChannels();
            if (currentChannel === data.channel) {
                selectChannel(null);
            }
        });

        socket.on('error', (data) => {
            alert('Error: ' + data.message);
        });

        // UI Functions
        function switchToSignup(e) {
            e.preventDefault();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('signupUsername').focus();
            clearAuthError();
        }

        function switchToLogin(e) {
            e.preventDefault();
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('loginUsername').focus();
            clearAuthError();
        }

        function clearAuthError() {
            const errorEl = document.getElementById('authError');
            errorEl.textContent = '';
            errorEl.style.display = 'none';
        }

        function showAuthError(message) {
            const errorEl = document.getElementById('authError');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showAuthError('Please enter username and password');
                return;
            }

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    clearAuthError();
                    socket.emit('register_user', { username });
                } else {
                    showAuthError(data.message || 'Login failed');
                }
            })
            .catch(err => showAuthError('Login error: ' + err));
        }

        function handleSignup() {
            const username = document.getElementById('signupUsername').value.trim();
            const password = document.getElementById('signupPassword').value;
            const password2 = document.getElementById('signupPassword2').value;

            if (!username || !password || !password2) {
                showAuthError('Please fill in all fields');
                return;
            }

            if (password !== password2) {
                showAuthError('Passwords do not match');
                return;
            }

            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    clearAuthError();
                    // Auto-login after signup
                    socket.emit('register_user', { username });
                } else {
                    showAuthError(data.message || 'Signup failed');
                }
            })
            .catch(err => showAuthError('Signup error: ' + err));
        }

        function showMainContent() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }

        function loadChannels() {
            socket.emit('get_channels');
        }

        function updateChannelsList(channels) {
            const list = document.getElementById('channelsList');
            list.innerHTML = '';
            channels.forEach(channel => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                if (currentChannel === channel.name) {
                    div.classList.add('active');
                }
                div.innerHTML = `
                    <div onclick="selectChannel('${channel.name}')">${channel.name}</div>
                `;
                list.appendChild(div);
            });
        }

        function selectChannel(channelName) {
            if (!channelName) {
                currentChannel = null;
                document.getElementById('currentChannel').textContent = 'Select a channel';
                document.getElementById('messagesContainer').innerHTML = '<div class="no-channel">Select or create a channel to start chatting</div>';
                document.getElementById('inputArea').style.display = 'none';
                document.getElementById('leaveBtn').style.display = 'none';
                return;
            }

            currentChannel = channelName;
            document.getElementById('currentChannel').textContent = '#' + channelName;
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('leaveBtn').style.display = 'block';
            document.getElementById('messageInput').focus();

            socket.emit('join_channel', { channel: channelName });
        }

        function leaveCurrentChannel() {
            if (currentChannel) {
                socket.emit('leave_channel', { channel: currentChannel });
                selectChannel(null);
                loadChannels();
            }
        }

        function logout() {
            currentUser = null;
            currentChannel = null;
            messages = {};
            socket.disconnect();
            
            // Reset UI
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            clearAuthError();
            
            // Reconnect socket for next login
            setTimeout(() => {
                socket = io();
                setupSocketListeners();
            }, 500);
        }

        function displayMessages(channel) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            const channelMessages = messages[channel] || [];
            channelMessages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message';
                if (msg.sender === currentUser) {
                    div.classList.add('own');
                }

                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                div.innerHTML = `
                    <div>
                        <div class="message-sender">${msg.sender}</div>
                        <div class="message-bubble">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                container.appendChild(div);
            });

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !currentChannel) {
                return;
            }

            socket.emit('send_message', {
                channel: currentChannel,
                content: content
            });

            input.value = '';
            input.focus();
        }

        function addSystemMessage(channel, message) {
            if (!messages[channel]) {
                messages[channel] = [];
            }
            // Don't re-display if not active channel
        }

        function showCreateChannel() {
            const channelName = prompt('Enter channel name:');
            if (channelName && channelName.trim()) {
                fetch('/api/channels', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: channelName.trim().toLowerCase() })
                }).then(() => {
                    loadChannels();
                    selectChannel(channelName.trim().toLowerCase());
                }).catch(err => alert('Error creating channel: ' + err));
            }
        }

        function updateStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            if (connected) {
                indicator.className = 'status-indicator connected';
                text.textContent = 'Connected';
            } else {
                indicator.className = 'status-indicator disconnected';
                text.textContent = 'Disconnected';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter to send message
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            document.getElementById('loginPassword')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });
            document.getElementById('signupPassword2')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleSignup();
                }
            });
        });
    </script>
</body>
</html>
