<!-- 
  Chat Widget Embed Code for Google Sites
  
  INSTRUCTIONS:
  1. Replace YOUR_SERVER_URL with your actual server URL
  2. Copy this entire code
  3. In Google Sites: Insert → Embed code
  4. Paste this code
  5. Click Insert
  
  EXAMPLE SERVER URLS:
  - Local: http://localhost:5000
  - Heroku: https://your-app-name.herokuapp.com
  - Own domain: https://chat.yoursite.com
  - IP address: http://192.168.1.100:5000
-->

<iframe 
  src="YOUR_SERVER_URL/embed-widget.html" 
  width="100%" 
  height="600px" 
  frameborder="0"
  allow="same-origin"
  style="border: 1px solid #e0e0e0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
</iframe>

<!-- 
  CUSTOMIZATION OPTIONS:
  
  Change height: height="800px"
  Change width: width="500px" (or use width="100%")
  Remove border: style="border: none; border-radius: 8px;"
  Add margin: style="margin: 20px 0;"
-->
